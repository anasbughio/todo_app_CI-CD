name: Deploy MERN App (Frontend S3 + Backend EC2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # -----------------------------
    # FRONTEND DEPLOY TO S3
    # -----------------------------

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload frontend to S3
      run: |
        aws s3 sync frontend/build s3://${{ secrets.S3_BUCKET_NAME }} --delete

    # -----------------------------
    # BACKEND DOCKER BUILD & DEPLOY
    # -----------------------------

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-todo:latest .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-todo:latest

    - name: Deploy Backend to EC2
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop mern-app || true
          docker rm mern-app || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/mern-todo:latest
          docker run -d --name mern-app -p 80:5000 \
            -e MONGO_URI='${{ secrets.MONGO_URI }}' \
            ${{ secrets.DOCKER_USERNAME }}/mern-todo:latest